<div class="max-w-4xl mx-auto py-10">
  <div class="flex items-center gap-4 mb-10">
    <h2 class="text-3xl font-black text-slate-900 tracking-tight">Portfolio</h2>
    <div class="h-1 flex-grow bg-slate-100 rounded-full">
      <div class="h-1 w-20 bg-blue-600 rounded-full"></div>
    </div>
  </div>

  <div class="mb-12">
    <div class="group bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-3xl shadow-xl shadow-blue-200 text-white relative overflow-hidden">
      <div class="relative z-10">
        <span class="px-3 py-1 bg-white/20 backdrop-blur-md rounded-full text-xs font-bold uppercase tracking-wider mb-4 inline-block">
          Featured Project
        </span>
        <h3 class="text-3xl font-black mb-2">Project CV Website (SPA)</h3>
        <p class="text-blue-100 mb-6 max-w-md">
          Website Single Page Application (SPA) yang dibangun menggunakan jQuery AJAX dan Tailwind CSS untuk performa yang cepat dan desain yang responsif.
        </p>
        <div class="flex gap-3">
          <span class="px-3 py-1 bg-white/10 rounded-lg text-xs border border-white/20 uppercase font-bold">HTML5</span>
          <span class="px-3 py-1 bg-white/10 rounded-lg text-xs border border-white/20 uppercase font-bold">Tailwind</span>
          <span class="px-3 py-1 bg-white/10 rounded-lg text-xs border border-white/20 uppercase font-bold">jQuery</span>
        </div>
      </div>
      <div class="absolute -right-10 -bottom-10 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
    </div>
  </div>

  <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
    <div class="p-6 border-b border-slate-50 bg-slate-50/50">
      <h3 class="font-bold text-slate-800 flex items-center gap-2">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.412-4.041-1.412-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        Cari GitHub Project
      </h3>
    </div>
    
    <div class="p-8">
      <div class="flex flex-col sm:flex-row gap-3 mb-8">
        <input type="text" id="githubUser" placeholder="Masukkan Username GitHub..." 
               class="flex-grow px-5 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
        <button id="loadGithub" 
                class="px-8 py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-blue-600 active:scale-95 transition-all duration-200 shadow-lg shadow-slate-200">
          Cari Repositori
        </button>
      </div>

      <div id="loading" class="hidden text-center py-10">
        <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-blue-600 rounded-full" role="status" aria-label="loading">
          <span class="sr-only">Loading...</span>
        </div>
        <p class="mt-2 text-slate-500 font-medium tracking-wide">Mengambil data...</p>
      </div>

      <div id="githubData"></div>
      <ul id="repoList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></ul>
    </div>
  </div>
</div>
