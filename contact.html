<div class="max-w-xl mx-auto py-10">
  <div class="flex items-center gap-4 mb-10">
    <h2 class="text-3xl font-black text-[#5c4033] tracking-tight">Hubungi Saya</h2>
    <div class="h-1 flex-grow bg-[#ede0d4] rounded-full">
      <div class="h-1 w-16 bg-[#8b5e3c] rounded-full"></div>
    </div>
  </div>

  <div class="bg-[#fdfaf6] rounded-3xl shadow-xl shadow-[#e6d3b3]/50 border border-[#ede0d4] p-8 md:p-10">
    <form id="contactForm" class="space-y-6">
      
      <div>
        <label for="name" class="block text-sm font-bold text-[#5c4033] mb-2 ml-1">Nama Lengkap</label>
        <input type="text" id="name" placeholder="Masukkan nama Anda" 
               class="w-full px-5 py-3 bg-[#f5efe6] border border-[#e0d3c2] rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#8b5e3c] focus:bg-white transition-all duration-200">
        <small class="error hidden mt-2 ml-1 text-xs font-semibold text-red-500" id="nameError"></small>
      </div>

      <div>
        <label for="email" class="block text-sm font-bold text-[#5c4033] mb-2 ml-1">Alamat Email</label>
        <input type="email" id="email" placeholder="contoh@email.com" 
               class="w-full px-5 py-3 bg-[#f5efe6] border border-[#e0d3c2] rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#8b5e3c] focus:bg-white transition-all duration-200">
        <small class="error hidden mt-2 ml-1 text-xs font-semibold text-red-500" id="emailError"></small>
      </div>

      <div>
        <label for="message" class="block text-sm font-bold text-[#5c4033] mb-2 ml-1">Pesan</label>
        <textarea id="message" rows="4" placeholder="Tuliskan pesan Anda di sini..." 
                  class="w-full px-5 py-3 bg-[#f5efe6] border border-[#e0d3c2] rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#8b5e3c] focus:bg-white transition-all duration-200 resize-none"></textarea>
        <small class="error hidden mt-2 ml-1 text-xs font-semibold text-red-500" id="messageError"></small>
      </div>

      <button type="submit" 
              class="w-full py-4 bg-[#8b5e3c] text-white font-black uppercase tracking-widest rounded-2xl shadow-lg shadow-[#d6b98c] hover:bg-[#6f472f] hover:-translate-y-1 active:scale-[0.98] transition-all duration-300">
        Kirim Pesan
      </button>
    </form>

    <div id="successMsg" class="hidden mt-6 p-4 bg-[#f5efe6] border border-[#e0d3c2] rounded-2xl text-[#5c4033] text-center font-bold flex items-center justify-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
      </svg>
      Pesan berhasil terkirim!
    </div>
  </div>
</div>
