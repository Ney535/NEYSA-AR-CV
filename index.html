<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Neysa</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    #content {
      transition: all 0.4s ease;
    }

    .nav-active {
      color: #a16207 !important; /* coklat tua */
      border-bottom: 2px solid #d6b98c; /* coklat soft */
    }
  </style>
</head>

<body class="bg-[#fdfaf6] text-[#5c4033] font-sans">

  <!-- HEADER -->
  <header class="bg-[#f5efe6]/90 backdrop-blur-md shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">

      <div class="text-2xl font-black text-[#8b5e3c]">My Portofolio</div>

      <!-- HAMBURGER -->
      <button id="menuBtn" class="md:hidden text-2xl text-[#8b5e3c]">
        ☰
      </button>

      <!-- NAV -->
      <nav id="navMenu" class="hidden md:block absolute md:static top-full left-0 w-full md:w-auto bg-[#f5efe6] md:bg-transparent shadow-md md:shadow-none">
        <ul class="flex flex-col md:flex-row md:space-x-8 text-xs font-bold uppercase tracking-widest text-[#7a6a5a] text-center md:text-left">

          <li data-page="home.html" class="nav-item py-3 md:py-0 cursor-pointer hover:text-[#8b5e3c] nav-active">Home</li>
          <li data-page="about.html" class="nav-item py-3 md:py-0 cursor-pointer hover:text-[#8b5e3c]">About</li>
          <li data-page="skills.html" class="nav-item py-3 md:py-0 cursor-pointer hover:text-[#8b5e3c]">Skills</li>
          <li data-page="experience.html" class="nav-item py-3 md:py-0 cursor-pointer hover:text-[#8b5e3c]">Experience</li>
          <li data-page="github.html" class="nav-item py-3 md:py-0 cursor-pointer hover:text-[#8b5e3c]">Portfolio</li>
          <li data-page="education.html" class="nav-item py-3 md:py-0 cursor-pointer hover:text-[#8b5e3c]">Education</li>
          <li data-page="certificate.html" class="nav-item py-3 md:py-0 cursor-pointer hover:text-[#8b5e3c]">Certificates</li>
          <li data-page="contact.html" class="nav-item py-3 md:py-0 cursor-pointer hover:text-[#8b5e3c]">Contact</li>

        </ul>
      </nav>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="container mx-auto px-4 md:px-6 py-10 md:py-16">
    <div id="content" class="min-h-[50vh]"></div>
  </main>

  <!-- FOOTER -->
  <footer class="text-center py-6 md:py-10 text-[#a1887f] text-xs md:text-sm">
    &copy; 2026 Neysa Portfolio
  </footer>

  <script>
    $(document).ready(function () {

      function loadPage(page) {
        $("#content").fadeOut(200, function() {
          $(this).load(page, function (response, status) {
            if (status == "error") {
              $(this).html(`
                <div class="text-center py-20">
                  <h2 class="text-3xl font-bold text-[#a16207] mb-2">Error 404</h2>
                  <p class="text-[#7a6a5a]">Halaman <b>${page}</b> tidak ditemukan.</p>
                </div>
              `);
            }
            $(this).fadeIn(300);
          });
        });
      }

      // LOAD AWAL
      loadPage("home.html");

      // NAV CLICK
      $(".nav-item").click(function () {
        $(".nav-item").removeClass("nav-active");
        $(this).addClass("nav-active");

        let page = $(this).data("page");
        loadPage(page);

        // auto close menu di mobile
        $("#navMenu").addClass("hidden");
      });

      // TOGGLE MENU MOBILE
      $("#menuBtn").click(function () {
        $("#navMenu").toggleClass("hidden");
      });

    });
  </script>

</body>
</html>
